name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gson
      run: |
        mkdir desktop\lib
        cd desktop
        curl -o lib\gson-2.10.1.jar https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar

    - name: Compile DesktopApp
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java

    - name: Create JAR file
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class lib\ icons\

    - name: Build EXE with jpackage (FIXED)
      shell: pwsh
      run: |
        # Tumia drive root short path
        $tempDir = "C:\temp_build"
        New-Item -ItemType Directory -Force -Path $tempDir
        
        # Copy jar to short path
        Copy-Item "desktop\AlfarooqDesktop.jar" "$tempDir\"
        Copy-Item -Recurse "desktop\icons" "$tempDir\" -ErrorAction SilentlyContinue
        
        cd $tempDir
        
        # Build EXE
        jpackage --input "." `
                 --name "AlfarooqApp" `
                 --main-jar "AlfarooqDesktop.jar" `
                 --main-class "DesktopApp" `
                 --type "exe" `
                 --dest "."
        
        # Move output
        New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\installer"
        Copy-Item "*.exe" "$env:GITHUB_WORKSPACE\installer\" -ErrorAction SilentlyContinue

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqApp-Installer
        path: installer\*.exe
