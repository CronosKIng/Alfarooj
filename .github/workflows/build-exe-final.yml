name: Build Windows EXE - Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download SQLite JDBC
      run: |
        mkdir -p app/libs
        curl -L -o app/libs/sqlite-jdbc.jar https://github.com/xerial/sqlite-jdbc/releases/download/3.44.1.0/sqlite-jdbc-3.44.1.0.jar
    
    - name: Compile Java
      run: |
        cd app
        mkdir -p build/classes
        dir src\main\java\com\alfarooj\timetable\desktop
        javac -cp "libs\*" -d build/classes src\main\java\com\alfarooj\timetable\desktop\DesktopLauncher.java
    
    - name: Create JAR
      run: |
        cd app
        jar cvfe build/libs/AlfaroojDesktop.jar com.alfarooj.timetable.desktop.DesktopLauncher -C build/classes .
        copy libs\sqlite-jdbc.jar build\libs\
    
    - name: Create EXE with jpackage
      run: |
        jpackage --type exe `
          --name "AlfaroojTimeTable" `
          --input app/build/libs `
          --main-jar AlfaroojDesktop.jar `
          --main-class com.alfarooj.timetable.desktop.DesktopLauncher `
          --dest artifacts `
          --win-console `
          --win-dir-chooser `
          --win-menu `
          --win-shortcut
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooj-Windows-EXE-Final
        path: artifacts/*.exe
