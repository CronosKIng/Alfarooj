name: Build Desktop JAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-desktop-jar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson library
      run: |
        mkdir -p desktop/lib
        wget -q -P desktop/lib/ https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar
    
    - name: Compile Java
      run: |
        cd desktop
        javac -cp "lib/gson-2.10.1.jar" -d . DesktopLauncher.java
    
    - name: Create JAR file
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopLauncher *.class
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-JAR
        path: desktop/AlfarooqDesktop.jar
        retention-days: 30
