name: Build Windows EXE Direct

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson library
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
    
    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR file
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Download launch4j
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://github.com/lukaszgryglicki/launch4j/releases/download/3.50/launch4j-3.50-win32.zip" -OutFile "launch4j.zip"
        Expand-Archive -Path launch4j.zip -DestinationPath .
    
    - name: Create launch4j config file
      shell: pwsh
      run: |
        @"
        <?xml version="1.0" encoding="UTF-8"?>
        <launch4jConfig>
          <dontWrapJar>false</dontWrapJar>
          <headerType>gui</headerType>
          <jar>desktop\AlfarooqDesktop.jar</jar>
          <outfile>desktop\AlfarooqDesktop.exe</outfile>
          <errTitle>Alfarooq Desktop</errTitle>
          <cmdLine></cmdLine>
          <chdir>.</chdir>
          <priority>normal</priority>
          <downloadUrl>https://java.com/download</downloadUrl>
          <supportUrl></supportUrl>
          <stayAlive>false</stayAlive>
          <restartOnCrash>false</restartOnCrash>
          <manifest></manifest>
          <icon></icon>
          <jre>
            <minVersion>11.0</minVersion>
            <maxVersion></maxVersion>
            <jdkPreference>preferJre</jdkPreference>
            <runtimeBits>64</runtimeBits>
          </jre>
          <versionInfo>
            <fileVersion>1.0.0.0</fileVersion>
            <txtFileVersion>1.0.0.0</txtFileVersion>
            <fileDescription>AL FAROOJ AL SHAMI Time Table System</fileDescription>
            <copyright>2025</copyright>
            <productVersion>1.0.0.0</productVersion>
            <txtProductVersion>1.0.0.0</txtProductVersion>
            <productName>Alfarooq Desktop</productName>
            <internalName>AlfarooqDesktop</internalName>
            <originalFilename>AlfarooqDesktop.exe</originalFilename>
          </versionInfo>
        </launch4jConfig>
        "@ | Out-File -FilePath launch4j.xml -Encoding UTF8
    
    - name: Build EXE with launch4j
      shell: pwsh
      run: |
        .\launch4j\launch4j.exe launch4j.xml
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-EXE
        path: desktop/AlfarooqDesktop.exe
        retention-days: 30
    
    - name: Upload JAR backup
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-JAR
        path: desktop/AlfarooqDesktop.jar
        retention-days: 30
