name: Build Desktop App (EXE & JAR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build JAR
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class

    - name: Create EXE using jpackage (built-in JDK 17)
      shell: pwsh
      run: |
        cd desktop
        # Create EXE using jpackage (comes with JDK 17)
        jpackage --input . --name AlfarooqApp --main-jar AlfarooqDesktop.jar --main-class DesktopApp --type app-image --dest .
        # Compress the generated folder
        Compress-Archive -Path AlfarooqApp -DestinationPath AlfarooqApp.zip -Force

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Desktop
        path: |
          desktop\AlfarooqDesktop.jar
          desktop\AlfarooqApp.zip
        retention-days: 30
