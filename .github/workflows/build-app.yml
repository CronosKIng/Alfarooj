name: Build Desktop App (EXE & JAR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build JAR
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class

    - name: Download launch4j (official release)
      shell: pwsh
      run: |
        # Download from official launch4j website
        $url = "https://liquidtelecom.dl.sourceforge.net/project/launch4j/launch4j-3/3.50/launch4j-3.50-win32.zip"
        Invoke-WebRequest -Uri $url -OutFile "launch4j.zip"
        Expand-Archive -Path launch4j.zip -DestinationPath launch4j -Force
        # Verify download
        Get-ChildItem launch4j

    - name: Create EXE with launch4j
      shell: pwsh
      run: |
        $config = @'
        <?xml version="1.0" encoding="UTF-8"?>
        <launch4jConfig>
          <dontWrapJar>false</dontWrapJar>
          <headerType>gui</headerType>
          <jar>desktop\AlfarooqDesktop.jar</jar>
          <outfile>desktop\AlfarooqApp.exe</outfile>
          <errTitle>Alfarooq</errTitle>
          <classPath>
            <mainClass>DesktopApp</mainClass>
            <cp>lib\gson-2.10.1.jar</cp>
          </classPath>
          <jre>
            <minVersion>11</minVersion>
          </jre>
        </launch4jConfig>
        '@
        $config | Out-File -FilePath launch4j.xml -Encoding UTF8
        .\launch4j\launch4j.exe launch4j.xml

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Alfarooq-Desktop
        path: |
          desktop\AlfarooqDesktop.jar
          desktop\AlfarooqApp.exe
        retention-days: 30
