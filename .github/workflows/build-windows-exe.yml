name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create lib directory
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path desktop\lib
    
    - name: Download Gson library
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar" -OutFile "desktop\lib\gson-2.10.1.jar"
    
    - name: Compile Java
      shell: pwsh
      run: |
        cd desktop
        javac -cp "lib\gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR file
      shell: pwsh
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Create EXE using jpackage
      shell: pwsh
      run: |
        cd desktop
        jpackage --input . --name AlfarooqDesktop --main-jar AlfarooqDesktop.jar --main-class DesktopApp --type app-image --dest .
        Compress-Archive -Path AlfarooqDesktop -DestinationPath AlfarooqDesktop.zip -Force
    
    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-EXE
        path: desktop/AlfarooqDesktop.zip
        retention-days: 30
    
    - name: Upload JAR as backup
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-JAR
        path: desktop/AlfarooqDesktop.jar
        retention-days: 30
