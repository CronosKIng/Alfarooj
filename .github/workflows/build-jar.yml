name: Build Desktop JAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-jar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Download Gson
      run: |
        mkdir -p desktop/lib
        cd desktop
        wget -q https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar -P lib/
    
    - name: Compile
      run: |
        cd desktop
        javac -cp "lib/gson-2.10.1.jar" -d . DesktopApp.java
    
    - name: Create JAR
      run: |
        cd desktop
        jar cvfe AlfarooqDesktop.jar DesktopApp *.class
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: AlfarooqDesktop-JAR
        path: desktop/AlfarooqDesktop.jar
        retention-days: 30
